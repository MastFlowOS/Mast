<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Mast — The premium operating system for client acquisition. Verified emails, phone numbers, websites, and Instagram profiles." />
    <meta property="og:title" content="Mast — Sales-ready lead intelligence" />
    <meta property="og:description" content="Multi-channel lead generation built for agencies, freelancers, and growth operators." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />

    <!--
      Non-blocking font loading.
      The render-blocking pattern (<link rel="stylesheet">) prevents the browser
      from painting ANYTHING until fonts.googleapis.com responds. If that request
      is slow, blocked by a VPN, privacy tool, corporate firewall, or regional
      restriction — the entire page stays blank indefinitely.

      Fix: load as media="print" (non-blocking), swap to media="all" on load.
      The page renders immediately with the system font stack; Inter swaps in
      once the stylesheet arrives. font-display:swap in the URL ensures individual
      glyphs don't block text rendering either.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,400;0,14..32,500;0,14..32,600;0,14..32,700&display=swap"
      />
    </noscript>

    <title>Mast — Client Acquisition OS</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
